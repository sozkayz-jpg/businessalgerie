name: Deploy public site to o2switch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare static export (remove dynamic routes)
        run: |
          mkdir -p .build-backup
          # Routes serveur / API non exportables
          mv app/api .build-backup/api
          mv app/\[locale\]/admin .build-backup/admin
          mv app/\[locale\]/member .build-backup/member
          mv app/\[locale\]/checkout .build-backup/checkout
          # Middleware inutile pour un export statique public
          mv middleware.ts .build-backup/middleware.ts 2>/dev/null || true
          # Config statique
          cp next.config.public.ts next.config.ts

      - name: Build static export for o2switch
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://businessalgerie.com' }}
          NEXT_PUBLIC_ADMIN_URL: ${{ vars.NEXT_PUBLIC_ADMIN_URL || 'https://dashboard.businessalgerie.com' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Add root index redirect
        run: |
          # La locale par défaut est le français.
          cp dist/fr/index.html dist/index.html

      - name: Restore dynamic routes
        if: always()
        run: |
          mv .build-backup/api app/api
          mv .build-backup/admin app/\[locale\]/admin
          mv .build-backup/member app/\[locale\]/member
          mv .build-backup/checkout app/\[locale\]/checkout
          mv .build-backup/middleware.ts middleware.ts 2>/dev/null || true

      # Option A : déploiement SFTP (recommandé si o2switch l'accepte)
      - name: Deploy to o2switch via SFTP
        if: ${{ secrets.O2SWITCH_SSH_PRIVATE_KEY != '' }}
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.O2SWITCH_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.O2SWITCH_REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.O2SWITCH_REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.O2SWITCH_REMOTE_PORT || '22' }}
          SOURCE: "dist/"
          TARGET: ${{ secrets.O2SWITCH_REMOTE_TARGET }}
          ARGS: "-avz --delete"

      # Option B : déploiement FTP avec mot de passe
      # Décommente cette section et commente l'étape SFTP si tu n'as pas de clé SSH.
      # - name: Deploy to o2switch via FTP
      #   if: ${{ secrets.O2SWITCH_FTP_PASSWORD != '' }}
      #   uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      #   with:
      #     server: ${{ secrets.O2SWITCH_REMOTE_HOST }}
      #     username: ${{ secrets.O2SWITCH_REMOTE_USER }}
      #     password: ${{ secrets.O2SWITCH_FTP_PASSWORD }}
      #     local-dir: "dist/"
      #     server-dir: ${{ secrets.O2SWITCH_REMOTE_TARGET }}
      #     protocol: ftps
      #     port: 21
